<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="author" content="이중for문">
    <meta name="keywords" content="이중for문, BallBox, Minac">
    <meta name="description" content="강남대학교 컴퓨터공학부 2025-2 학술제">
    <meta name="viewport" content="height=device-height, initial-scale=1.0">
    <title>BallBox</title>
    <style>
      body{
        margin: 0px;
        background-color: #000;
      }
      #room{
        background-color: #000;
        position: absolute;
        top: 60px;
        left: 60px;
      }
      #Minac{
        border-radius: 50%;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div id="room">
      <div id="backgroundCover"></div>
      <div id="Minac"></div>
    </div>
    <script>
      let room = {
        /*객체 호출값*/dom: document.querySelector("#room"),
        /*상시 설정값*/lightColor: "100, 100, 100", //순서대로 RGB
        /*상시 설정값*/lightAlpha: { unitAlpha: 0.01, unitNumber: 50 }, //둘을 곱한 값이 충돌 직후 불투명도
        /*상시 설정값*/size: { x: 600, y: 600, z: 600 },
        /*내부 연산값*/wallLightAlpha: { w: 0, a: 0, s: 0, d: 0, r: 0, f: 0 }
      };

      let Minac = {
        /*객체 호출값*/dom: document.querySelector("#Minac"),
        /*내부 연산값*/position: { x: room.size.x/2, y: room.size.y/2, z: room.size.z/2 },
        /*내부 연산값*/speed: { x: 0, y: 0, z: 0 },
        /*상시 설정값*/acceleration: 0.1, //한 프레임에 변경할 속도
        /*상시 설정값*/radius: 50, //Minac.position.z가 0일 때를 가정하여 구한 반지름
        /*초기 설정값*/color: "#505"
      }; //Minac의 좌표 정보를 담는 오브젝트
      Minac.dom.style.background = Minac.color;

      const keyState = {
        w: false,
        a: false,
        s: false,
        d: false,
        r: false,
        f: false
      }; //여기에 등록된 키가 allowedKeys에 반영
      const allowedKeys = Object.keys(keyState);
      addEventListener('keydown', k => {
        if(allowedKeys.includes(k.key)){
          keyState[k.key] = true;
        };
      });
      addEventListener('keyup', k => {
        if(allowedKeys.includes(k.key)){
          keyState[k.key] = false;
        };
      });

      const keyControl = function(){
        if(keyState.w){ Minac.speed.y -= Minac.acceleration; };
        if(keyState.a){ Minac.speed.x -= Minac.acceleration; };
        if(keyState.s){ Minac.speed.y += Minac.acceleration; };
        if(keyState.d){ Minac.speed.x += Minac.acceleration; };
        if(keyState.r){ Minac.speed.z += Minac.acceleration; };
        if(keyState.f){ Minac.speed.z -= Minac.acceleration; };
      }; //가속도를 반영하는 코드

      const calcPosition = function(){
        Minac.position.x += Minac.speed.x;
        Minac.position.y += Minac.speed.y;
        Minac.position.z += Minac.speed.z;

        if( Minac.position.y <= Minac.radius ){
          Minac.speed.y *= -1;
          const overUp = Minac.radius - Minac.position.y;
          Minac.position.y += 2 * overUp;
          room.wallLightAlpha.w = room.lightAlpha.unitAlpha * room.lightAlpha.unitNumber;
        }else if( Minac.position.y >= room.size.y - Minac.radius ){
          Minac.speed.y *= -1;
          const overDown = room.size.y - Minac.radius - Minac.position.y;
          Minac.position.y += 2 * overDown;
          room.wallLightAlpha.s = room.lightAlpha.unitAlpha * room.lightAlpha.unitNumber;
        }; //상벽이나 하벽에 도달한 경우 튕기기

        if( Minac.position.x <= Minac.radius ){
          Minac.speed.x *= -1;
          const overLeft = Minac.radius - Minac.position.x;
          Minac.position.x += 2 * overLeft;
          room.wallLightAlpha.a = room.lightAlpha.unitAlpha * room.lightAlpha.unitNumber;
        }else if( Minac.position.x >= room.size.x - Minac.radius ){
          Minac.speed.x *= -1;
          const overRight = room.size.x - Minac.radius - Minac.position.x;
          Minac.position.x += 2 * overRight;
          room.wallLightAlpha.d = room.lightAlpha.unitAlpha * room.lightAlpha.unitNumber;
        }; //좌벽이나 우벽에 도달한 경우 튕기기

        if( Minac.position.z <= Minac.radius ){
          Minac.speed.z *= -1;
          const overApproach = Minac.radius - Minac.position.z;
          Minac.position.z += 2 * overApproach;
          room.wallLightAlpha.f = room.lightAlpha.unitAlpha * room.lightAlpha.unitNumber;
        }else if( Minac.position.z >= room.size.z - Minac.radius ){
          Minac.speed.z *= -1;
          const overRetreat = room.size.z - Minac.radius - Minac.position.z;
          Minac.position.z += 2 * overRetreat;
          room.wallLightAlpha.r = room.lightAlpha.unitAlpha * room.lightAlpha.unitNumber;
        }; //전벽이나 후벽에 도달한 경우 튕기기
      };

      const calcDOM = function(){
        const eyeRadius = (Minac.radius*2-Minac.radius*Minac.position.z/room.size.z)/2;
        Minac.dom.style.width = `${eyeRadius*2}px`;
        Minac.dom.style.height = `${eyeRadius*2}px`;
        Minac.dom.style.top = `${(Minac.position.y-room.size.y/2)/(Minac.position.z/room.size.z+1)+room.size.y/2-eyeRadius}px`;
        Minac.dom.style.left = `${(Minac.position.x-room.size.x/2)/(Minac.position.z/room.size.z+1)+room.size.x/2-eyeRadius}px`;
      }; //복잡한 좌표 계산

      const wallLight = function(){
        if( room.wallLightAlpha.w > 0 ){ room.wallLightAlpha.w -= room.lightAlpha.unitAlpha; };
        if( room.wallLightAlpha.a > 0 ){ room.wallLightAlpha.a -= room.lightAlpha.unitAlpha; };
        if( room.wallLightAlpha.s > 0 ){ room.wallLightAlpha.s -= room.lightAlpha.unitAlpha; };
        if( room.wallLightAlpha.d > 0 ){ room.wallLightAlpha.d -= room.lightAlpha.unitAlpha; };
        if( room.wallLightAlpha.r > 0 ){ room.wallLightAlpha.r -= room.lightAlpha.unitAlpha; };
        if( room.wallLightAlpha.f > 0 ){ room.wallLightAlpha.f -= room.lightAlpha.unitAlpha; };

        document.querySelector("#backgroundCover").innerHTML = `
          <svg width="${room.size.x}" height="${room.size.y}" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <polygon points="0,0 ${room.size.x},0 ${room.size.x*3/4},${room.size.y/4} ${room.size.x/4},${room.size.y/4}"
              fill="currentColor" stroke="#FFF" stroke-width="2" stroke-linecap="round" id="Yside"/>
              <polygon points="0,0 0,${room.size.y} ${room.size.x/4},${room.size.y*3/4} ${room.size.x/4},${room.size.y/4}"
              fill="currentColor" stroke="#FFF" stroke-width="2" stroke-linecap="round" id="Xside"/>
            </defs>
            <rect x="${room.size.x/4}" y="${room.size.y/4}" width="${room.size.x/2}" height="${room.size.y/2}"
            fill="rgba( ${room.lightColor}, ${room.wallLightAlpha.r} )" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
            <use href="#Yside" style="color: rgba( ${room.lightColor}, ${room.wallLightAlpha.w} );"/>
            <use href="#Xside" style="color: rgba( ${room.lightColor}, ${room.wallLightAlpha.a} );"/>
            <use href="#Yside" style="color: rgba( ${room.lightColor}, ${room.wallLightAlpha.s} );"
            transform="rotate(180 ${room.size.x/2} ${room.size.y/2})"/>
            <use href="#Xside" style="color: rgba( ${room.lightColor}, ${room.wallLightAlpha.d} );"
            transform="rotate(180 ${room.size.x/2} ${room.size.y/2})"/>
            <rect x="0" y="0" width="${room.size.x}" height="${room.size.y}"
            fill="rgba( ${room.lightColor}, ${room.wallLightAlpha.f} )" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
          </svg>
        `;
      };

      const main = function(){
        keyControl();
        calcPosition();
        calcDOM();
        wallLight();
      };
      setInterval( main, 20 );
    </script>
  </body>
</html>
